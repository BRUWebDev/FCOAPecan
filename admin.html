<html>
  <head>
    <title>FCOA Pecan Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="./assets/styles/main.css" />
    <link rel="stylesheet" href="./assets/styles/admin.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="text-heading my-5">Admin Dashboard</h1>
      <div class="background-secondary-color p-4 rounded">
        <form>
          <div class="row mt-3">
            <div class="col-3 col-sm-2 col-xl-1">
              <h3 class="text-heading">Alert</h3>
            </div>
            <div class="col-1 d-flex align-items-center">
              <div class="form-check form-switch form-check-reverse">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="alert-switch"
                />
                <label
                  class="form-check-label text-form-heading"
                  for="switchCheckReverse"
                  >Active</label
                >
              </div>
            </div>
            <div class="col text-end">
              <button type="submit" id="board-save" class="btn btn-primary">
                <span
                  id="alert-save-spinner"
                  class="spinner-border spinner-border-sm visually-hidden"
                  aria-hidden="true"
                ></span>
                <span id="board-save-text">Save Board</span>
              </button>
            </div>
          </div>
          <hr />
          <div class="mb-3">
            <label for="alert-title" class="form-label text-form-heading"
              >Title</label
            >
            <input type="text" id="alert-title" class="form-control test" />
          </div>
          <div class="mb-3">
            <label for="alert-message" class="form-label text-form-heading"
              >Message</label
            >
            <textarea
              type="text"
              id="alert-message"
              class="form-control"
            ></textarea>
          </div>

          <div class="row mt-5">
            <div class="col">
              <h3 class="text-heading mt-5 d-inline">Events</h3>
            </div>
            <div class="col text-end">
              <button class="btn btn-primary">Add Event</button>
            </div>
          </div>
          <hr />
          <div class="mb-3">
            <ul id="event-list" class="list-group list-unstyled">
              <!-- Event items will be dynamically added here -->
            </ul>
          </div>

          <div class="row mt-5">
            <div class="col">
              <h3 class="text-heading">Board</h3>
            </div>
            <div class="col text-end">
              <button type="submit" id="board-save" class="btn btn-primary">
                <span
                  id="alert-save-spinner"
                  class="spinner-border spinner-border-sm visually-hidden"
                  aria-hidden="true"
                ></span>
                <span id="board-save-text">Save Board</span>
              </button>
            </div>
          </div>
          <hr />
          <div class="mb-3">
            <label
              for="board-president-name"
              class="form-label text-form-heading"
              >President</label
            >
            <input type="text" id="board-president-name" class="form-control" />
          </div>
          <div class="mb-3">
            <label
              for="board-treasurer-name"
              class="form-label text-form-heading"
              >Treasurer</label
            >
            <input type="text" id="board-treasurer-name" class="form-control" />
          </div>
          <div class="mb-3">
            <label
              for="board-secretary-name"
              class="form-label text-form-heading"
              >Secretary</label
            >
            <input type="text" id="board-secretary-name" class="form-control" />
          </div>
        </form>
      </div>
    </div>

    <div class="toast-container position-fixed top-0 end-0 p-3">
      <div
        id="toast"
        class="toast align-items-center text-bg-success border-0"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="d-flex">
          <div class="toast-body">Successfully saved alert.</div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
            aria-label="Close"
          ></button>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="./assets/js/admin.js"></script>
  </body>
</html>
